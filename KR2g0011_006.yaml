  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0011_WYG_006-1a, image: WYG0447/WYG0447-0047c.png}
body:
  text: 象䑓首末附録印紙題穆陵在御四十一年臣子之攻上躬者莫大於霅川之事得罪竄斥乃斷國者有不得不然暨主德尊鼎命固權相歿化弦更竄斥者復美仕通貴穆陵之心白於後世矣士大夫立朝抗論當先寘禍福度外吉㐫死生固非人所能為而天亦不可必剛簡胡公之䟽豈異於天日之洪者不幸物故不端平之待豈非天者亦不可必耶當時施行既曰追毁出身以来文字考功厯獨非耶宜在所毁而猶經有司批給臨安視亰兆府公引典故為疑為此典者蓋以為他日牽復張本府公不署亦欲異於時後耳殆未思立法者忠厚之㫖不可以不論也故國三百年間於士大夫来始終而通塞則有命存焉胡氏子孫試以余說概之則知故國之延促有不係乎是者獨怪議者後五十年主少國危之際猶追咎此雖謂不知天可也少㣲之野鄭陶孫書桷㓜歲嘗讀曽大父樞宻越公家乗言寳慶改元九月旦胡評事進對首言濟邸死非上指使當立孤以明本意於時相臣震怒入對兩宫乞黜未幾御史李知孝希㫖具䟽削籍度嶺先公時尹錢塘力過閤言削籍二字故事必下京兆書考功籍公遲不肯署三入閤相怒曰趣書何言宿留凡七月始下公曰不十載當悔復且考功籍謹不渉署後必有知我者繇是戒兵士善䕶行復宻以錢鏹相遺贐自後先公門人王公邁亦踵論濟邸事而公亦被黜去端平末年公始得遂復桷獨恨不得與胡氏子弟㕘論来京師豫章周儀之間言是事桷具所以儀之曰剛簡諸孫攜考功紙来與予語誠不妄噫呉夫人之復封端平之初也復立濟祀德祐之末也馴致於此其何可言剛簡丁丑試殿下先公時為㕘詳併識於是大德乙已四明後學袁桷識阜陵之於忠簡眷眷如此則知廟謨豈嘗湏㬰忘克復哉志欲有為時未可為天也乾淳遺民之𤣥来呉澄再拜觀異謹記渡江炎德衰顛倒由姦檜胡公進讜言直欲掃蕭艾居然新州謫名震天壤内恢復事已非能保清凈退孝皇眷先臣拔擢起滯廢羽儀廊廟間議論尤正大丘園将佚老耿耿丹心在耆明嘅凋謝一劄重恩賚矯首仰乾淳芳猷傳異代龍章儼如新字畫有餘態前脩不可作展巻一長喟後學生金華葉謹翁拜手敬題右剛簡胡公考功印紙一巻得不與出身以来文字同時追毁若端平追復贈官朝奉當由至元初悉上送官今不知在亡矣大德丙午余客洪泮時縉雲鄭公潜昭提學江右三山王澧翁適留公館中胡揚自立以此卷屬余求公一言遂并得王詩語各有意去之二十五年自立之子義同復求余書其後謹按剛簡當宋寳慶乙酉上書言濟邸事稱周公誅蔡叔而封蔡仲此周之所以長齊桓公殺子糾唐太宗殺建成元吉皆絶其世此齊之所以亂不旋踵則天之所以殺唐子孫幾盡又引申生得請其應為韓謂濟王不幸事異蔡叔子糾元吉宜厚其追贈褒崇録其子孫歲時致其祭祀使濟王之寃如戾太子之得以自伸不至如恭世子之欝而不散語極沉痛此宋三百年理義之所漸摩涵飬者也嗚呼逺矣反覆此書有味其言故特著之巻末昔先祖成敬先生與剛簡同年以詩貢於鄉名次適相先後宋嘉定丙子也至順二年正月初吉里契家諸孫劉岳申拜手謹書出身文字盡追休底事尚書印紙留法宻以踈唐律令謚剛與簡魯春秋批書畢竟明功過開寫如今信觧由當日有心言濟邸後来無命到欽州諸公長樂方資笑千載權姦不掩羞開巻為公三下拜胡門家寳子孫收元統甲戌秋八月朔日郡諸生周似周拜手謹題徃年於胡剛簡公之家見其奏稿讀之流涕為綴數語於後今在洪又見此印厯觀畢愴然臨川呉澄識右宋大理評事胡公夣昱出身印紙一巻五縫尚書吏部考選之印鉗之批書有刑部臨安府吉州印巻端滅首三行第六紙去大半意此非告勑故毁而不追公貶在寳慶乙酉秋華文楊公長孺贈詩云便是吾鄉小澹菴明年夏司諌梁成大摘以劾楊公并按大理徐卿及胡公猶以為罰輕有㫖徐更鐫三官謫象州胡自象移欽州未行卒嘗語人以欠金之夣且曰彼紛紛者将謂嶺表真能殺人其定力如此紹定辛夘䝉恩歸櫬啓之面如生端平甲午從丞相鄭清之殿院王遂奏贈朝奉郎予一子恩告云以直言求人豈以直言罪之又貫日偃月折檻投杼語精對的當筆者洪舍人咨夔即紙尾所書同時鐫罰者也咸淳丁夘夏詔賜諡奉常初議憲肅考功以公父名憲周改正肅都省定為剛簡考功覆審曰宜且謂昔魯㕘政宗道擬以是易名議者不知其美諡更曰肅簡歐陽公以為惜今評事得之可無憾矣其秋命下如章公扶持綱常物議所共與親閱辭讀言責所當然餘論建詳本傳所居功德源尚有子孫其居吉水東郭者曰揚字自立子士㑹能負藝為校官寳此巻如拱璧求余題綴院長臨川公後於是乎書致和元年夏五月史官曽巽申拜手謹題右此忠簡剛簡兩公家世所寳文字及元朝諸閣老所為題識翰墨也皇明洪武戊辰科進士吉水解縉持以視予謂忠簡視剛簡為從孫忠簡後裔無聞剛簡則有八世孫義同之子季琛義賢之子亮有守有為其家之藏更加装潢仍為題品是使胡家子孫有通知二父之美無材智不足之憾縉妙年用心忠厚若此逺到豈可量也哉觀畢題識其後而歸之洪武二十二年倉龍已巳冬十有一月丁夘朔翰林學士奉議大夫兼左春坊左賛善劉三吾書孔子曰國家将興必有禎祥國家将亡必有妖孽宋之亡秦之賊史之專妖孽也胡銓與夣昱禎祥也妖祥不兩立秦史不死公之手則公死其手明矣此宋家存亡之一機也或曰秦史奚而不簒曰勢不可也忠臣義士滿天下而二公尤卓卓者故當有所畏憚耶洪武已巳秋襄陽任三泰題麒麟鳳凰芝草祥瑞之物幸而出於盛世人以為羙恨不生於其時身親見之不幸而出於衰世見而驚怪之戕賊之鄙賤而輕易之聞者無不惜焉放臣出子不遇於時若子竒之逐屈原之放比干之剖心鄂侯之葅醢生無一日得志於時而坎坷者終其身然當時疾之不過倖臣一二而已天下至今惜之世愈逺而愈傳傳而益彰書之典册猶想望其風采思見其人而不可得視當時疾之者有甚於糞壤比之於仇讎恨不手刃而啖其肉猶足以相報當宋南渡髙宗以昏懦之才避敵一隅捐中原之地偷旦夕之安而屈身忝祖僕僕亟拜於金人之前曽無怍色而蟊賊之檜又隂蝕其中力主和議當時士大夫曲脊從流莫敢齟齬其間一編脩官胡銓獨能慨然以義諍之三百年士風頼以不泯雖遭貶竄而宋之宗社岌岌乎殆矣降及寧宗史彌逺恃小人之才專權擅勢貴和以宗室賢子孫聦明過人疾惡如讎為所搆䧟出之寧國而立理宗於是母后内專權勢而彌逺之勢益熾矣霅川之後貴和既死猶議削奪以快其身心獨一評事胡夣昱又能慨然以義諍之竟以貶死嗚呼豈不重可惜哉今幸其八世孫士㑹之子若姪寳藏之其印厯及阜陵手𠡠一道賜銓者尚在反復熟玩慨然乆之洪武已已秋七月缺拜手謹題士大夫以道事君責難陳善身不暇恤其暇恤名哉剛簡公以忠被斥至追毁出身以来文字陋哉小人之為也公身沒而名愈彰天下公議自不可泯後之襲為小人者不可以鑒乎因拜觀公考功厯於胡氏之後宗訓所謹識於後泰和楊士竒書墳山祭田附剛簡公墓在本縣五十二都天玉山後白茅坑舊名鄧家墓今左曰小塘園右曰故事坑海螺形未山丑向之原一墳山四至東至田直下西至坑心直出南至第三尖峰北至直下抵田一原置醮祭租米六石六斗彭庚一佃白馬廟前早米五斗彭重八佃天玉山下晚米一石五斗彭重六佃宋家屋塲田四坵計米二石又佃天玉山下晚米一石五斗彭重七佃白馬廟前早米二斗五升又佃宋家屋塲早米四斗彭重十佃白馬廟前早米二斗五升又佃宋家屋塲早米二斗嗚呼年代更歴既乆祭田不知為何人所侵而存焉者特簿籍耳雖公墓亦幾奪於豪族成化間頼我先父恒孚䖏士暨伯父恒性恒仁君披荆棘逐狐兎相與竭力恢復乃於辛丑念六日乙酉之吉奉先大父㓜文府君柩附塟於公墓之左歲時祭掃迄今不替嘗與山近守墓者約每遇清明必先掛紙否則不許於墓之前後左右取茅并以其原約姓名刻於下方俾後之子孫凢登是墓者亦因有所稽考云嘉靖十四年乙未歲孟夏之吉禄謹識書印紙題後右先大祖剛簡公印紙盖因宋理宗時明濟邸寃被謫輙追毁出身以来文字則此印紙亦冝在追毁中而猶經有司批給止去首三行說者謂非誥勑𩔖故毁而不追理或然也特不知何年代珍藏於水東自立君之族且請元季及我國朝諸元老為之題識其用心亦勤矣又不知何歲月流落於山下宋良臣氏之家𢎞治間郡庠生歐陽偕元氏為其門舘客見此題紙鄉貫住址頗大驚異詰之曰此實新村胡氏先世之重噐子何因而得其速舉以還庶幾免禍良臣氏首肯遂因偕元氏送至而吾新村亦禮謝焉但首有忠簡公誥命一通邑城東臻化君謂其𣲖實出忠簡多方力索余時侍諸父側而議之曰剛簡雖視忠簡為從孫然羅一峯有剛簡不附忠簡之說執之何益遂勸以歸諸嗚呼物之存亡豈固自有數也耶去年方擬刻象䑓首末愈児適自家携至因請壽諸梓以免復為他姓所得余然而笑曰物之存亡固自有數他非乃所知矣十一世孫兩峯胡禄謹書書象䑓首末後先大祖剛簡公諱夣昱字季昭又字季汲號竹林愚隠宋理宗朝為大理評事應詔上䟽訟濟邸寃言甚切直忤㫖同日貽書史相彌逺亦觸其怒遂謫象州羇管未幾御史李知孝希旨劾以罪重罰輕復有移欽之命行間搆疾語人以欠金之夣尋卒於象越七年理皇悔悟始詔許歸骨予一子恩即諱知柔字惠直君由功德源徙居新村之祖也君號慕無及乃搜其書䟽送行哀輓若詩與文彚集一帙題之曰象䑓首末云嗚呼自宋迄今三百餘年於兹幸其遺稿尚存先人諱達字恒孚號誠菴䖏士嘗手録一册以賜禄曰知父而不知祖飛鳥是也汝軰其毋忘先公之羙哉禄以甲申冬應貢北上丙戌春拜桂陽州訓導俱寳如拱璧携之以行恒惴惴然恐負先人之教乃今捐俸鋟梓盖将藏之於家以免謄冩之勞且俾凢為吾胡氏後者皆知先公仗節死義凛然猶有生氣務思脩身慎行以求無忝乃所願也否則徒為人口實又何貴於斯刻也哉嘉靖十四年乙未歲孟夏之吉十一世孫桂陽州學訓導胡禄頓首拜書象䑓首末附録
