body:
  text: 象䑓首末巻四宋胡知柔編哀詞友人羅㓜明大理評事胡公季昭余執友也昔所敬慕異扵他朋自拾兩科為天子士官聲實炳著余嘗至京蒙握手如褐衣舊繼聞以敢言斥象郡余寔匏繫不克送欲贈以言又未克即達心甚愧焉其介弟國賔訃至又未幾季昭訃至州里嘆惜去年秋天子追慨遺直詔返柩歸塟嘆者始恱余悲季昭為直臣國賔為愛弟而溘殞荒嶠無所寄余悰焉昔屈原未死宋玉詞以招其魂今季昭國賔已死獨不招其魂耶乃為賦哀詞且附以招魂之詞曰繄若人之負抱兮藹温潤而清明學既粹扵風雅兮行亦中乎凖䋲奉孀母以克謹兮友哲兄而和平俯科目以薦掇兮匪中扄之所榮儼執操以堅挺兮肅官箴而是程爰因職以有諌兮乃人倫之大經惟哲之肇古兮夫孰叅其至情事有異而莫測兮若混昊之與靈本揆權以適正兮凛羣疑而未氷豈通國之少亢兮何退瑟而凌兢羌立志之謇謇音撿兮獨慷慨而羾誠謂正主以大義兮詎容託諸鮮能既考理以稽則兮言彌激而彌崢睨虎豹之九關兮披琅玕而畢呈貫忠烱扵陽烏兮曷虹蜺之足凌偉勁厲以非婞兮寧有覬乎骨鯁之稱伊國典之貴宥兮猶未逭扵南征若愛弟之知孝兮願以身而偕行念手足之一體兮矧可愧乎脊令雖共履於蝮虺兮瀕萬死而忍更彼百越之臻臻兮邈覊鬼之相仍惟藥劑之弗時兮迫竒疾而易嬰悲鴈序之先㫁兮震哀鴻而必驚慘聯璧之先露兮識不識而涕零幸天道之好還兮皎白日之晶熒俾輤帷之速返兮顯覆蓋之益宏睠臣子之一節兮初奚間於死生峭千仞以賈患兮視九殞而固輕卓公議之不泯兮上下各保夫全名䓁百世以靡憾兮曷余涕之縱横駭今昔之夐隔兮悵永懐之弗䞉嗟南方之迢逓兮慮剛魂之􅑏􅑏欲遐招而未果兮恐巫陽之莫憑乃自招曰魂兮歸來無久滯於南方些嗟彼南方瘴墨横空霧雨㝠㝠為鬼為人怵脉䘮神魂兮歸來不可乆留些嗟彼南方火日如焚血石沸川四序不移翕赫崩獰魂兮歸來不可乆留些嗟彼南方颶颷海騰七晝八夕颭踣隮顛魂兮歸來不可乆留些粤惟故鄉風土恬夷白鷺青原欝潔明眸沙麓逢春草木葱籠魂兮歸來可徜可徉些舊隠逶迤華室靚深祚階隆隆禰廟孔安歲時焄蒿飲食芳馨魂兮歸來可歆可寧些亂曰四月維夏兮日淑時宜離苦即休兮靈車啓途路經鏵觜兮遨以逰由湘之源兮汎蘭舟九嶷舜藏兮呌以登靈妃皷瑟兮如相迎屈原孤憤兮昔所尊精神黙通兮造幽𤣥自古有死兮直則難求仁而得兮又何嘆昆弟携手兮宛如存既忠且敬兮輝一門乃瞻祝融兮顧炎皇靈風吹雨兮旐以揚州邑奠瘞兮非故常貞肝義膽兮凛不亡富之濡兮杭之湄斧封載兆兮卜無違猿吟鶴唳兮相與隨或騎鯨魚兮款天扉千秋萬歲何窮期魂兮歸來察余詞祭文羅居易鳴呼天下之公論豈待百年而後定耶惟公孝友之德稱於鄉黨忠讜之節聞於朝廷人之所難行者公則力行而不倦人之所難言者公則直言而無隠其過人逺矣嶺表之責将老其才而大其用也孰不期公以生還乃遽厄終窮而沒于瘴域夙有令名而無夀考傷哉傷哉雖然人誰無死脩短數也死而芬芳傳不朽也有命自天特俾歸塟豈惟足以慰九泉之靈凢宇内負忠讜之氣者亦自是少伸矣嗚呼天下之公論豈待百年而後定耶嗟我與公情親道合自公云亡我生靡樂繆此花封之撫字適逢旅襯之經從觸目酸辛滿懐悲愴既捐俸給以助舟車恨守官箴無由逺送難兄令子扶䕶間關精魂如生應與偕還不腆酒殽哭奠江渚憶公清淚如此江水歸歟歸歟一隔千里戴文子栩嗚呼元化槖籥幹流為神志士心胷浩達為伸神非爾僣吉凶在人伸不我囬賢佞幾塵嗟嗟季昭伊國靡家論議罍洗膽肝莫鎁昔者同朝有驂其驊觚稜拜舞星澹月斜誰招君言誰斥君死淮南之諫平津之詆南冠到頭一身萬里人為天疑我窺其神人為君咤我䆒其伸不然胡不憗君以富貴夀考而徑殞於瘴江之濵是故昔賢所以求仁而先正龔鄒不以慼而易欣者也自君之行逐客相繼沈預議而遭彈余贈吟而同祟自嘆數竒不諉君累天王聖明公論首出雲開南荒恩沾白骨君之姱節允為國光匪國之光抗我三綱三綱斯張宇煇宙煌回首昨逰夣逾一紀宦情秋薄分刺君里冩哀一酹芼蘋湘芷象州學祠堂奉安文鄒濟嗚呼徐公之治獄若徐有功之平胡公之言事有胡忠簡之直一時之屈萬世之信不在其身在其子孫徐公曩時寓居僧寺因此有祠焉胡公則僦民居以䖏而無所於祠二公學同道官同寺去國同時貶死同地合堂而祠誰不謂宜迺相學宫講堂之東奉二公祠髙山仰止嘉與學者共之秋菊寒泉世世其永無替吉水縣學祠堂奉安文李義山歲在乙酉誰秉國成事有難言衆噤不聲公繇下僚奮身起爭上批龍鱗氣直理明下捋虎鬚辭峻義精羣憸駭聞顙泚膽驚偃月㣲笑而公南行既斥不復雖死猶生褒表恤録訓辭哀矜旌直識過惟天子明嗚呼浮雲蔽空波頺谷傾彼譛人者為公為卿曾榮華之幾時紛唾罵其可憎而羇臣之遺墨逐客之落魄使人起敬起慕曰彼穢而此馨以是觀之士生斯世義利取舎可不謹其所程嗚呼公之㓜學慕汲直之為人仗節秉義固出於中心之誠為臣委質視一死為甚輕茍綱常其不墜寧有覬於身後之名比仁山而争高凛勁節之嶙峋附祠學宫公豈此榮從澹翁之俎豆埀鄉社之儀刑洗腆明薦掲䖍妥靈魂無不之寧不此歆吉州學祠堂奉安文李義山惟公寳慶遷客端平忠魂以一身荷名義之重以數語救綱常之存何蠻烟瘴雨之弗貸而不使少待夫朝暾此悲悔何及之恨所以重播告於訓詞之温也嗚呼天子聖明公死猶生一廷尉評萬古汗青我來作州適在公里憶公平生人逺室邇爰肇公祀于儒之宫匪我私公卿評之同吉日辰良敬妥祠事百祀千秋以引勿替跋封事後張侍講之言曰為已無所為而然者也嗟乎此天理人心之正而公私義利之所由判歟大理評事胡公書云今日之追贈褒崇其實於濟王有何加益然於主上君德所益實多可謂無所為而為之者矣遂是時廬居句曲山中讀考功奏䟽言霅川之亂非濟王之心濟王之死非主上之心固已為之三嘆比讀公封事而主上之心與濟王之心亦以明白遂為之慨然以迄於今去夏以副端入對首論公仗節秉義之風足以寒亂臣賊子之膽主上玉色為之愀然今丞相又奏贈公員外郎仍與一子恩豈非天理人心之不容已者歟因為之敬書其後以告來者端平二年四月既望旉易王遂謹書祖宗忠厚立國涵養士氣故小大之臣皆得以危言讜論植立名節今觀竹林胡公封事則寧皇三十年豐芑之澤可知巳孟子曰欲為君盡君道欲為臣盡臣道三𣸪此藁為之歆嘆淳佑三年七月二十四日臨川羅愚謹書歲在辛酉䋲祖仕於李湛溪先生幙中閱邸報見廷評胡公封事明辯濟獄之寃既而獲譴為象之行矯首南望哀不自勝涕泗滂如斯涕也不為無從而出也今三十七年矣自郎畀節於江右公之子金溪令君始以公之象䑓首末見示獲盡觀公之前後諌䟽及名世羣英題䟦不勝起敬起嘆九京不可作孰能起公之死而從之逰乎雖然盛德之後必大公有子今通閨籍試壮邑三異騰播行有鳬蜚丹極之招矣䋲祖不揆綴兩詩附於末櫝且備員舉陟明之櫝以少見其思賢之心景定二年十一月日眉山學齋史䋲祖謹題寳慶己酉竹林先生以封事掇竒禍謫象未期年徙欽未及行而歿越六年有歸塟之命又越二年有復官之命延賞之命恩數便蕃訓詞隠惻四海臣子有以知先生乙酉之謫非聖天子本心也嗚呼范司諌之貶忤吕夷簡爾豈忤仁皇也哉鄭監門之斥忤吕惠卿爾豈忤神考也哉胡編脩之竄忤秦檜爾豈忤髙廟也哉柄天工者竊弄霆電以行胸臆方其砰訇迅烈之時俄而度者未必不疑天怒之不可囬也然太虛湛一非客感所能終蔽所過者化俄而開明曽不崇朝亦猶人身病在股肱暫然痿痺而心君無恙方且豁然醒脫然瘳矣然司諫尋膺柄用編脩寖被咨庸監門雖不幸猶及見更張而聞收召也獨先生委骨炎荒陽春雨露沛然九天而老栢孤根槁死風雪中矣此聖天子所以為之歎悼同時氣類所以為之感且慟也九原義烈英英長存方将喜見天日開明豈以死生晝夜為隔也哉先生昉有列於朝也在寧皇時不願以寳賞轉官力言得寳歸疆未必為福逆全方以戰多自詭逆未有萌先生首言禍必在山東欲先時隄防隨時操縱許國之遣尤隠憂焉大則因星雷極言隠伏之機小則因經界極言増賦之害先生天性忠愛如水必濕如火必熱蓋其素所蓄積自然而然乙酉封事非激於一發之暫者不如是何以感悟淵衷如史魚身後之諫也哉先生嗣子知柔彚錄首末彬齋沐薫祓莊誦敬歎曰復其見聖人天地之心乎景定辛酉六月上澣里中後朝散大夫行常丞兼權兵部郎中兼史舘校勘陳彬頓首謹書國無綱常不可以為國人無氣節不可以為人寳慶一䟽鳳鳴朝陽竹林知愛國耳不知愛其身也欲植綱常耳非欲植氣節也先皇帝嘉其忠而官其子今天子又嘉其子之能官而擢之朝著而節惠之典且行又所以夀千萬世之綱常而非獨昭一士之氣節而已余嘗訪象䑓之遺轍過鷺洲之故家奕奕髙風九京如可作也咸淳丁卯與公之子部門公同朝出示象䑓首末敬瓣香再拜附書於後是歳良月既望杭山章鑑自有天地以来人倫之常至於今不墜其間非無闕齾之䖏必有豪傑之士出力而扶持之一時罔上之姦懼其不便於巳也挾權勢而與之角徃徃能摧折其身而不能泯滅其言能使之流離竄斥於天未定之時而不能不使光明赫奕於氷山既摧之後是足以見天理民彛之真决非人力之私所能勝也理評胡公陳大義於寳慶之初一字一言皆赤心片片中流出視澹菴斬檜之䟽不可優劣權奸不容竟以謫死端平改紀公論大明公之忠烈當與天壤俱弊曩時誣善之徒雖三尺童子爭唾之矣雖然公之為此豈其出於一旦之决也哉惟公弟兄俱賢閫無間言槖無私蓄其貶也季弟相從竟死象䑓厥後伯氏歸公之骨亦殞於瘴一門之内其於人倫之常亦可謂無愧焉耳矣當公草奏時灼然知不可以不言而言之不可已也公之心惟徐公瑄足以知之謂公於他人奏事急急傳録問之則曰若幸他人言之則某可以止胡公封事有惻怛憂愛之誠無激訐呌呼之氣嗚呼是可為後世事君者法矣咸淳丁夘小雪前一日天台董樸百拜敬書三百年權奸之誤國亡國者五初亡以蔡後亡以賈開禧之敗去亡無幾紹興寳慶雖未有亡國之禍然挾敵勢貪天功誣上行私使不得盡為臣為子為弟之道則二㐫之惡殆浮於三㓙當是時小而敢言國家之大事以扶天地之常經者廬陵二胡公也忠簡忠憤激烈警悚一世剛簡援引故實敷陳倫理明白懇切不為危辭又不牴忤時宰而貽書以感動之忠簡之言似賈誼剛簡之言似陸贄二公知愛君而不知愛其身一也夫人臣之告君冀其悟耳豈欲觸其怒哉夫子之請討陳恒也所以告其君大夫嚴正而不迫如此後之忠君徇國者其尚有味於吾言臨川草廬吳澄敬書寳慶霅川之事兄弟天倫一大變也時玉堂行詞有曰長枕大衾之樂豈不爾思尺布斗粟之謡自貽伊戚讀者至今悲之在廷諸賢身任綱常相繼論列公以棘屬毅然批鱗且獻言牴觸權近至謫死象郡悠然不悔雖其忠誠根於天性亦國家涵飬人才崇奨公論之効也迨紹定霈恩而特㫖歸塟端平改紀而褒贈延賞咸淳嗣服又易名剛簡得魯公所不得之諡英英忠魂亦可少慰於九原之下矣盛德餘澤天所錫予百世宜未艾然銅仙露泣似踐畀秦得請之夣玉盌人間或者至以叔子識環之報疑之嗚呼吾屬尚忍言之公之諸孫克紹先烈以家乗徴言於余余謂公之芳名在史册忠義在穹壤奚庸贅然髙山景行千載一日余則不能巳於言也因疥名氏於編末云大德丙午後學東陽厲一鶚拜書剛簡公上穆陵書字字從天理中流出不待賛羙至謂幸而有他人言之則某可以止此真無所為而為期於人主之一悟而巳所謂求仁得仁者謫死嶺外公何怨乎穆陵後聞王公遂之言為之愀然加恩延賞曽不崇朝則公之謫死直由丞相嗔耳又所謂君仁臣直者也嗚呼盛哉俛仰今古為之慨然大德丁未八月望鄱陽徐明善拜手敬書象䑓首末巻四
