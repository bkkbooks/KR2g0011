body:
  text: 象臺首末傳記𩔖二名人之屬提要臣等謹案象臺首末五巻宋胡知柔編述其父夢昱獲譴始末夢昱字季昭號竹林愚隠吉水人嘉定丁丑進士官大理評事以論濟王事貶死象州寳慶元年追贈員外郎咸淳三年追諡剛簡知柔於寳祐四年編其奏疏遺文後又益以諡議及諸家贈答題跋之作以成此書而彈文亦具載焉其編次頗無法度如第一巻封事及上史彌逺書之下忽攙以李知孝梁成大糾彈夢昱二疏及徐瑄救夢昱書其下又為夢昱祭弟文一篇其下又以追復省劄之𩔖共為一巻第二巻告詞行􅄒之下忽攙以夢昱所進劄子四篇其下又贅以趙文等所作夢昱水石圖贊五首共為一巻第三巻諸人贈詩十九首之下忽攙入夢昱自詠歩王盧溪韻詩二首再寄一首其下又載他人詩八首忽又攙入夢昱自詠榕隂圖一首其下又載他人詩十八首共為一巻第四巻為諸家哀詞祭文題跋而第五卷省劄諡議又居其後末附像贊六首又與水石圖贊各編而出身印紙題跋亦與封事題跋各編均龎雜無緒又其書作於宋理宗時安得載及元明人詩文殆必其後人所竄亂非知柔之舊矣徒以夢昱氣節足重故流𫝊至今而宋史夢昱無傳所載亦不免闕漏今特著之録以示表章之義焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b918059e5098af5ebd40a75ce39e27047496f7dc888c3d99791d987a52d73390
