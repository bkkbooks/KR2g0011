body:
  text: 象臺首末卷一宋胡知柔編奏疏書附寶慶乙酉詔求直言八月二十二日應詔上封事臣仰惟太祖皇帝艱難肇造以有天下顧命之日不傳之子而傳之弟友愛之義超越前古嘗聞周之太伯以一國而遜之弟矣未聞以天下遜之弟者也周人有道之長冠冕三代則太伯王季友愛之義實根本之我宋立國亦惟賴祖宗友愛之義以為根本蓋友愛一念乃天理之真人倫之至也所恃以培植立國之根本者莫先於此周人不幸而有管蔡之變我宋不幸而有秦邸之變又不幸而有近日濟邸之變其事不同而所以處兄弟之難者則同當管蔡挾祿父以為亂流言騰播王室幾危周公始不得巳而誅放之然南陔暫廢常棣繼作感傷之意見於詠歌封胡示寵蔡祀續焉是周公所以待管蔡者終歸於厚友愛之義未嘗終絶於管蔡之身後也當秦邸隂謀竊發事迹敗露初則罷尹開封繼以賜第西洛或有以怨望告者太宗皇帝始不得巳而貶責之逮凶訃上聞感泣悲痛追封之典賜諡之典恤孤之典相繼舉行是太宗皇帝所以待秦邸者終歸於厚也友愛之義未嘗終絶於秦邸之身後也始焉之誅放貶責雖天地鬼神亦知吾有不得已之心終焉之勤渠繾綣乃所以全吾友愛之本心天理依然人倫如故一代立國之根本初無傷焉於皇我宋所以扶持立國之根本者又與周人同一意矣乃若濟邸之變特出於一時之不幸非可以管蔡秦邸之事而例論也陛下篤孔懷之恩崇追贈之典此真周公與大宗皇帝之用心也議者遂從而駁之臣竊以為君臣之分不可暫僣則駁之者乃臣下之職守也兄弟之情不可終絶則排羣議而無反汗焉乃陛下之恩意也秦邸之變議者或至斥以大逆或欲處以殊死太宗皇帝非愎諫者卒於不俞其請者何也彼則明君臣之分吾自全兄弟之情故也今臣下既聲濟邸之過陛下則從而宥其過臣下欲奪濟邸之恩陛下則從而厚其恩君臣之責庶兩盡矣奈何駁議一聞恩命竟寢則是陛下之待濟邸友愛之義終於絶矣戕天理斁人倫我宋立國之根本傷損多矣五霸莫盛於齊威身死未寒五公子爭立迄于簡公齊無寧嵗是何其禍之慘也蓋胚胎於子糾之變也子糾死矣曽無一語追悔營葬命繼等事並無聞焉是齊威友愛之義終於絶也唐之三宗莫盛於太宗不一再傳而數世本支殱於則天之手者幾無遺類是何其禍之深也蓋胚胎於建成元吉之變也建成元吉死矣并與其諸子而芟夷之是太宗友愛之義終於絶也使陛下之待濟邸友愛之義果終絶焉厥鑒不逺臣竊懼之臣又聞聖明在上天下無寃民乃若至親骨肉之間寃抑且不能以自伸未有不召變稔禍者晉之恭世子本無置毒之事也驪姬則以置毒誣之懼而出奔甘於自縊晉獻公卒不之察亦無有為之辨明者父子之天終不回焉異時出而為祟狐突親見而與語焉所謂請於帝以聲寃託於秦以伐罪者若怪也晉之禍卒如其言者何也寃抑之氣鬱而不散故也漢之戾太子本無巫蠱之事也江充則以巫蠱誣之盜兵自救懼禍自經其與恭世子之事相去無幾矣自田千秋急變訟太子寃武帝為之幡然感悟作思子宫為歸來望思之臺父子之天一旦復回有晉人之變而卒無晉人數世之禍者何也有以散其寃抑之氣故也夫父父子子兄兄弟弟均之為天理之真人倫之至也以父子兄弟之至親而寃抑且不能以自伸焉他可知矣天理幾於斁而人倫幾於泯矣如之何不召變稔禍耶臣嘗閲京府所勘沈伯括等案所言濟邸隱匿有無虛實臣不得而知之就使有之其事乃在陛下臨御以前其罪合在赦宥之域今不必論矣又嘗閲詔獄所勘謝周卿等案竊見逆賊深夜突發濟王脫身竄匿既而尋獲迫以僣偽濟王發聲痛哭首以不得干犯陛下與皇太后為戒則其本心可見矣議者乃謂其與賊同情商議入據郡治又謂其欲遁往平江據城為固幸府僚有留其行者是殆風聞之過也否則為府僚者駕其説以為免罪計也不能止其僣而能留其行此必無之事也將誰欺欺天乎濟王不幸而罹此橫逆陛下政當軫鴒原急難之情矜之念之詎忍罪之陛下果以議者之言而罪之則濟王寃矣邇來間有訟其寃者然羣言雖進淵聽未回則是陛下友愛之義終於絶矣九原不可作是非曲直濟王豈能與議者辨又豈能與陛下較縱使追贈褒崇其實於濟王無加益設欲削奪追貶其實於濟王無加損然陛下友愛一念或厚或薄天理之或缺或全人倫之或暌或合乃國家安危治亂之機所由判焉陛下未可以為末節細故而忽之詩曰昊天其子之天子者代天作子之義也子之子尤天之所屬愛者也濟王與陛下均為先帝子陛下兄日姊月而所以待濟王者如此彼蒼者天其謂陛下何書曰惟孝友于兄弟則友愛乃孝之大者也濟王承先帝溫清有年矣亦先帝所屬愛者也先帝仙遊日月幾何陛下奉先思孝而所以待濟王者如此則先帝在天之靈其謂陛下何記禮者曰孝者善繼人之志善述人之事則繼述乃孝之大者也太祖皇帝處兄弟之常如彼太宗皇帝處兄弟之變又如彼陛下鑒於成憲而所以待濟王者如此則祖宗在天之靈其謂陛下何記禮者又曰孝弟發諸朝廷行乎道路則朝廷者乃孝弟之道所從出也濟王在邸初無恩德及人天下未免矜憐而追念之何也意者祖宗友愛之義素孚於人心則斗粟尺布之謡未免責陛下以備也陛下教天下以弟而所以待濟王者如此則天下之人其謂陛下何陛下無謂變故之潛消隂弭而天心為已順無謂雨澤之隨禱輒應而天心為已格人心即天心也亦先帝與祖宗之心也自濟邸之訃既傳聞者莫不悲之往往謂狂狡妄圖守二不武茍能夤夜勦除豈至詰朝僣偽濟王果何罪而至此極耶人心之憤惋勃勃如也自封駁之説既行聞者莫不恨之往往謂是特故彰濟邸之惡以戢訛言耳以止謗議耳欲加之罪其無辭乎人心之憤惋則猶故也以人心察之則天心可知矣乃者乾文疊疊示變固已略寓其譴告之意矣以天心推之則先帝與祖宗之心又可知矣陛下若不早回友愛之天政恐姦雄得以竊議讐敵得以竊窺乘間抵巇特未可測况乎寃抑不散乖戾寖生他日國家之禍變何有終窮臣竊懼之夫子之作春秋凡二百四十二年行事皆所以埀萬世戒也而鄭伯克段之事獨首書之其意深矣此陛下所當默會也孟軻論周公誅管蔡之過以為古之君子其過也如日月之食人皆見之及其更也人皆仰之臣之所以望陛下者亦猶孟軻之論周公也陛下誠能思祖宗立國之根本不外乎孝友之一念以周公之厚於管蔡太宗皇帝之厚於秦邸者為法以齊威之薄於子糾唐太宗之薄於建成元吉者為戒回友愛之本心復哀矜之初意亟圖今是旋悔昨非當臨朝之際感泣涕洟諭大臣若曰人皆有兄弟朕獨亡濟王僣偽事迫於凶黨非其本謀幸平心定氣為朕處之寧以恩而屈朕法毋執法以奪朕恩亟取先朝秦邸故事為朕參酌而行無忽凡追贈褒崇之典寧過乎厚焉降存亡繼絶之詔徐擇人而立之加以嵗時遣使致其祭祀撫其家屬厚其賚豫使死者可以無憾生者不至無聊如此則濟王之寃抑如戾太子之得以自伸不至如恭世子之鬱而不散矣陛下友愛之一念油然復生恩榮浹於九泉怡愈洽於四海天理缺而復全人倫暌而復合為天下國家九經庶可次第而推廣之仰焉可以慰天心俯焉可以慰人心幽焉可以慰先帝與祖宗之心作宋明主埀宋休光所以扶持立國之根本者不間於周則所以綿延享國之厯數者必踰於周何憂乎姦雄何畏乎讎敵何虞乎禍變臣之所懼者不足懼矣陛下降詔求言四閲月矣臣諦觀默察朝思夕想惟時事紛紜可為痛哭流涕者多矣獨於陛下待濟邸一節尤有嫠不恤緯之憂陛下庶幾改之臣日望之所以隱忍而未敢言陛下過而不改是謂過矣臣是以不顧首領披露肺肝昧萬死為陛下言之萬一陛下少留穆清反覆展玩幡然而聽之非臣之幸亦非濟邸之幸乃宗社之大幸否則狂僣之罪臣無所逃斧鉞鼎鑊惟陛下所命當席藁私室以俟焉謹録奏聞伏候敕旨上丞相史彌逺書夢昱竊惟伊尹商之阿衡也而所以告戒其君者必先之以立愛惟親立敬惟長而巳夫立愛必自親始而親莫親於父母立敬必自長始而長莫長於兄伊尹引其君以當道豈無他説必先於斯二者何也蓋立愛立敬乃人道之大端而君道之本原所從出也大丞相擁立聖明以定宗社大計正當開導聖明以為宗社久計可也夢昱竊聞主上恭儉寬仁不改父道祇畏承順克慰母心則立愛之道大丞相既有以開導之矣乃者霅川之變實出於濟王之不幸聞其死莫不悲之主上存恤之意始於厚終於薄追贈之典始於渙汗終於反汗立敬之道未免缺然則大丞相開導之功無乃猶有慊歟今有人焉適值凶黨迫其兄為首以劫掠其財物者其兄又不幸而死於鄉鄰救捕者之手自忠厚者處之必將悲其兄無辜而橫死且察其兄本無心於劫掠軫其孤孀理其喪葬凡事之所當任責者惟恐有一之不加厚焉若或忿忿然真以劫掠之罪罪其兄聞有疏其兄之宿過者反從而聽之信之哀弔不至撫問不加丘嫂之痛哭無聊者不之恤蒸嘗之似續無人者不之顧視同氣如仇敵棄手足如贅疣則宗族姻黨必將交口譏議共指為殘忍刻薄人矣鄉曲之稍有識見者必將望望然去之而恥與之處矣此言雖小可以喻大今主上之待濟王或者其類此歟天下未有不長吾之長而能使億兆之衆歡然戴之以為君長者無怪乎人心之憤惋不平而閭謗巷議紛紜未巳也主上固不免負天下之謗大丞相不容不分其謗也公論之在天下未有久而不明者大丞相能逆料此事他日必無反覆否歟寃抑之在天下未有久而不伸者大丞相能逆計此事它日決不為國家之厲階否歟大丞相為宗社久安計未可以此事為不足芥蒂而忽之夢昱又竊聞乃者海陵郡使君傾逝大丞相悲痛感泣哽咽廢食所以撫存其諸孤經紀其身後事者靡不備至友愛之義人皆仰之雖然天下至大一家之推也潁考叔之孝於母能施及鄭莊大丞相之友于兄乃不能施及主上夢昱所以深為大丞相不滿也大丞相試深思而熟計之逝者已矣今日之追奪貶削其實於濟王有何加損然於主上君德所損甚大於大丞相計安宗社之功所損亦大今日之追贈褒崇其實於濟王有何加益然於主上君德所益甚多於大丞相計安宗社之功所益尤多主上出求言之綍今既數月矣以直言進者固有之獨於待濟王一節議論紛紜相為矛盾曾未有剖其事情稽其禍福平心定氣為國家懇切言之者夢昱田野書生荷大丞相擢用棘掾與濟王素無雅故亦未嘗覿面濟王僣偽委非本心夢昱因斷謝周卿等案頗知底蘊若更緘默不敢吐舌一言非惟上負君相抑亦下負所學是用歷考古事參稽先朝家法披露肝膽輒上封章昧萬死以言之謹用副本申徹鈞聽敢望大丞相不棄芻蕘留神展玩以至親兄弟手足之情體至尊兄弟手足之情當從容論道之際明以處濟邸一事開導上心務在補過而戒於文過務在格非而戒於遂非凡追贈褒崇等事蓋目今所當亟行者乃若存亡繼絶一節欲且先降旨以慰人心而徐圖之如此則主上立愛立敬之道兩無所愧大丞相開導之功於是乎大全矣一時可以無恨他日可以無愧萬世可以無譏矣書曰罔俾阿衡専美有商夢昱於大丞相深有望焉若或以狂僣罪之則斧鉞鼎鑊惟所裁耳夢昱甘之如飴無悔焉監察御史李知孝章疏臣仰惟皇帝陛下受上天之景命膺列聖之丕圖履位之初肇舉禋祀雲物開霽天宇清明祥風景星昭映披拂此陛下之得天心而天心之眷陛下也號令初敷雲行雨施輝光所被聲應氣求聖主作興萬物咸覩此陛下之得人心而人心之歸陛下也孟子曰使之主祭而百神享之是天受之使之主事而百姓安之是人受之堯舜所以得天下不過如此近年以來學術不明義理不講士風頽靡背正而適邪違道而干譽親文墨者不識典故習法令者不知憲章身為王臣而有嫉視君上之意職居朝列而有隂黨叛逆之心大為反道敗德之意肆騰挾邪醜正之語脅制上下誣蔑典常猶使在廷臣實疑懼臣伏見考功郎中洪咨夔迂潛晚出粗亦能文大理評事胡夢昱江西鄙人試法偶中遭遇聖主置身周行不思勉勵以報君德乃以詭怪而惑羣聽近者臣等相率奏請欵謁廟宫此乃援真宗哲宗朝故事考先臣司馬光之言所以隆陛下尊祖敬宗之心副萬姓尊君親上之意其所關係蓋為甚大咨夔則曰臺諫相率勇往不顧者恭請聖駕欵謁景靈宫而已矣考詳典故以肅宫廟以安人心此豈細故而乃為譏誚之語如此其視君上為何如其視宗廟為何所耶蓋其憤給舍之駁濟王故誚陛下之謁宫廟原其心術允謂回邪夢昱素不能文且無所見突然上書言濟王事狂悖繆戾字字傾邪朝列切齒以為怪異如曰沈伯括等所供就使有之合在赦宥之域夫伯括所供事實所索案卷皆大逆不道之事身為法官豈不曉法安有惡逆而可以赦原乎觀其下語詳其用意考其引援皆其憤詈呪詛之語此必藩賊餘黨潛伏出入共成此書二人者同於黨惡而黨惡之辭則有輕重同為狂謬而狂謬之語亦有淺深臣欲望聖慈特賜睿斷將咨夔鐫罷夢昱追官落籍竄之海外州軍庶幾中外悚動知有君臣上下之分觀聽肅穆國勢尊安天下大幸伏候敕旨寶慶元年九月初三日檢會臣僚奏洪咨夔特降三官餘依胡夢昱追毁出身以來文字除名勒停送象州羈管臨安府差發前去取交管訖文狀申尚書省司諌梁成大章疏臣聞士大夫之趨嚮風俗之厚薄繫焉必其操行純一持論正平始足副公朝簡拔之意今有人焉學問本無而詭怪立異行實不副而矯飾沽名麾節屢更悖謬日甚傷風敗俗職此之由臣伏見朝請大夫直華文閣楊長孺拘僻而濟以暴狂狠而恣於酒向為守帥凌蔑僚屬誣劾寓公間行怪政所至貽笑見於前者臺臣之評奏臣不復再瀆天聽今六龍御天收用名賢以共起事功如長孺之習怪積謬何足齒録朝廷特以其名臣之子遂加抆拭賜以命召此初政之美意臣聞其人故態不改顛怪自如形之詩詠公肆譏訕其送胡夢昱行詩之末句云便是吾鄉小淡菴者前朝名臣胡銓也今長孺乃以夢昱况銓流傳道路有識駭憤方且以辭遜自高對客昌言略無忌憚臣謂長孺之所為若使立朝必黨和邪説簧鼓在列或叨外任必復行怪政貽害士民長孺之一身進退初無繫於輕重第恐中外觀望相師成風崇詭尚異波流莫返必致是非混亂分義不明他時復費朝廷區處臣實憂之臣欲望陛下特頒睿旨收還長孺召命指揮仍畀祠祿勒令間住俾知循省以正人心以厚風俗以為詭僻狂悖之戒謹具覺察以聞伏候敕旨貼黃臣照得前大理寺少卿徐瑄身為理寺長官見其屬夢昱之狂悖誣謗一至此極自合糾正訓戒使之捨逆歸順知有綱常始無負於朝廷擢用之意今乃不然惟知極力慫恿而巳觀其舉夢昱為賢能才識其詞有曰勤拳憂國慷慨敢言及引經決疑近古遺直等語今以瑄之言考瑄之心則夢昱狂悖誣謗之章必與瑄合謀共議而為之無可疑者臣契勘徐瑄胡夢昱雖已蒙朝廷追削貶竄公論猶以為罪大罰輕臣欲望睿斷將瑄夢昱更賜重議施行庶誅其無將之心以快公論仰乞睿照寶慶二年六月初一日檢會臣僚奏徐瑄更追三官移送象州居住胡夢昱送欽州編管仍令道州象州日下差發前去取交領狀申尚書省大理少卿徐瑄上史丞相書瑄嘗聞治世諱危亡之事而不諱危亡之言亂世諱危亡之言而不諱危亡之事此蓋儒者識治之格言而古今昭然之明驗也夫所謂諱危亡之事者非謂必無是事而諱之亦非謂危亡之立至也舉一事發一政有可以致危亡之理則惟患其不聞聞斯改之而已矣此則諱危亡之事也所謂諱危亡之言者非止於不樂聞而已也聞則忿疾之擯棄之甚者流放竄殛置之可死之地而後已天下由是而鉗口結舌朝廷有過不得聞則危亡基之矣此則諱危亡之言也是以自古聖君賢相莫不以樂善從諌為首稱而反是者必致危亡之地此必然之理不待旁引曲喻而後知也恭惟丞相一德格天再世相輔勳業之盛振古鮮儷士大夫之道古今譽盛德者不特以二十年身任天下之重為難而更化以來未嘗罪一言者雖狂悖妄誕肆為詆毁而丞相未始不優容之天覆地載海涵春育士大夫以是感激思奮凡朝廷稍有缺政則盡言無隱亦恃丞相有包荒之大德必無流放竄殛之事不然孰肻蹈不測之淵為嘗試之舉哉瑄竊見胡夢昱以囊封繳劄論及濟邸事獲大譴責投之嶺海固其自取然考其所為實有懇惻隱憂之心而無沽激矯飾之意朝廷所以特加竄於胡夢昱者不過以其位卑而言高又其言與論思之臣適相邂逅故其罰特異於他人而瑄區區千慮之愚竊以朝廷方以直言詢及草茅無間中外則不當以位卑為嫌丞相光輔聖主廣開衆正期年之間凡所以奬拔善類激昻士氣扶植祖宗以祈天永命者無所不用其至而首以直言罪一職事官竊為丞相惜之恐自是中外之人皆以言為諱其於丞相二十年涵容之美意輔贊之大業所損多矣瑄職在法守偶與胡夢昱同寅見其披閲謝周卿等案牘有感于中欲退而草封事久矣聞有囊封匭奏必汲汲傳録欲早知之問其故則曰若幸而有他人言之則夢昱可以止執筆細思作而復輟者至於三四此蓋瑄所親見灼知其出於至誠􅈤惻而非務為沽激求名之舉瑄既得於目擊不能為丞相言之則此身受陶成之恩恐卒無以報故敢冒昧控陳文象州祭弟利用行十八文維寶慶三年嵗次丙戌五月乙卯朔越二十有三日丁丑兄夢昱謹以清酌庶羞之奠昭告於十八弟之靈曰嗚呼嵗在丙午先人棄世姊九嵗伯兄六嵗豫兩嵗越明年丁未弟始生鞠育顧復先妣之劬勞極矣然猶幸有先祖在又六年壬子先祖棄世兄弟惸惸艱苦萬狀先妣忍飢寒躬織衽以供束修散遣從師每以無忝汝父為訓兄弟既長挾册授人負米為養先妣頗自慰每以振大家聲勉幸而伯兄舉于鄉豫亦竊第太常弟之不偶於場屋者特命耳不幸祿未及養先妣巳棄人間世兄弟心盟不謀而合欲使閫內無間言槖中無私蓄怡愈相歡共振門户以守先妣家法以踐先妣緒言家事無巨細弟每直前任之辛已冬豫蒙詔恩擢用棘掾弟偕豫以行既而骨肉聚處俸入不給弟協力支吾甘於寂淡時寄蕭寺閉戶翻書其用力亦勤矣抗志亦逺矣去年秋豫不量狂僣欲引吭一鳴弟毅然贊之既而坐罪削籍投竄象郡弟慨然從之水陸繚繞不知其幾千百里凡所以經紀行計調護行色者皆弟之力也豫之泛應曲酬言語飲食小有過忒弟之針警必隨之若弟者固豫之手足也亦豫之法家拂士也既抵象郡方期收召魂魄共為講學計嗚呼豈料惡辰參會弟乃為庸醫所殺耶弟苦痔疾特微恙耳初謂邂逅妙手因可絶一病根豈嘗聞以療痔而得死耶始豫與弟同室而寢同案而食未嘗頃刻相離也正月四日招陳維清者來弟以塗痔不便始異寢繼又以起坐不便始異食然無日不相聚話也十有六日遣周成等歸弟猶起而送之其晚豫訪舊從外來弟語豫曰我痔根突出幸可一併去之自此不復下牀復招陳維清則曰此療痔者之常也弟不以為疑豫亦何自而疑也况無日不隔室而語耶豈料弟之死也馴至晝夜呻吟寢食俱廢手足難屈伸肩背難轉仄弟始疑之豫亦疑之二十有三日招良醫陳安叟來診視豫始見弟面肉消瘦精神憔悴四體骨立陳安叟便疑脈氣不穩然猶幸可以救藥未以為死證也用藥一日稍效自後一切不效豫意謂弟出血過多元氣傷損太甚非可一二日取效也豈遽料其為死證耶二十七夜四更後弟出血如注迭唤二僕以舊衣滲漉豫皇皇無以為計二十八日黎明往禱於甘廟弟語豫曰可至誠以往豫禱而歸陳安叟亦來診視見弟顔色紅潤語言清爽豫甚以為喜陳安叟便言六脈俱虛將理半載未能平復亦不料燈欲滅而復明乃死證也既而又令陳維清者以藥止血幸而稍止二僕扶掖進藥食弟手足震而氣微喘急喚豫曰病勢變了急煎藥來救我豫猶以好語相溫存急捧藥以進弟力疾啜之又曰再煎藥來併請醫者來豫倉皇煎藥未熟請得陳安叟來弟顔色陡變一語不及發而溘然長往矣嗚呼豫實不料弟之死也使豫果料弟之死豈不能以一語問弟身後事耶弟而不以一語及身後事抑亦不自料其至於死耶豫之心弟素知之身後事雖無事於囑可也然兄弟至親萬古永訣豈有不及發一語耶是可恨也豫與弟為兄弟四十年同艱苦共患難所以相期者為何而弟乃止於此耶是可恨也弟之筆力遒徑交遊服之餘膏賸馥往往沾溉於人一鄉舉不能得而乃止於此耶是可恨也弟之襟懷磊落交遊敬之尚友名勝傾蓋如平生歡孰不以逺大期之今乃止於此耶是可恨也弟之議論明正縉紳器之命茍遇焉必非蠅營狗茍徒為利祿計而已今乃止於此耶是可恨也身為羈囚豫則有罪弟果何罪而死於此耶若豫者真為弟之纍纍也是可恨也弟之病也妻與女不及侍死也妻與女不及斂衣棺之類取具臨時雖欲勿之有悔可得歟是可恨也是可恨也豫素多病弟則康強弟偕豫來骨肉恃以無恐豈料多病者尚生而康強者則死耶康強者且不可恃多病者豈可恃耶嗚呼巳矣豫雖強顔世間亦鬱鬱無聊賴矣而今而後豫之心事訂於誰歟家事囑於誰歟開卷有得焉將誰告歟有疑焉將誰質歟正色之規逆耳之論非特子姪輩不可得而聞豫亦不得而聞矣嗚呼巳矣豫之手足偏斷矣豫之家法拂士云亡矣嗚呼豈庸醫果能殺吾弟耶抑亦弟之冥數止於此而分當死於庸醫之手耶不然則何為而適與之相邂逅耶善類以書相開釋者謂聞之前輩有愧而生不若無愧而死弟之此行於義得矣弟聞此言泉下固可以無恨也豫之恨不知何時而可釋耶雖然柏舟之節弟婦必能守之弟惟一女當如已出撫之弟未有男當謹擇而命繼焉豫與骨肉輩萬一再有聚會緣甘苦休戚誓必同之斷斷乎不相離也嗚呼此願其可遂耶其終不可遂耶一付之天而已矣豫罪重罰輕再汙白簡恐恐乎後命之至則弟之旅櫬未免孤寄今幸干二姪同周才等來使扶護舟行道廣東以歸流行坎止豫始泰然任命而無所芥蒂於中矣窀穸事則伯兄自能任其責嗚呼幾何而可以見弟墓之宿草耶其終不可得而見耶亦付之天而已矣弟之靈其隨旅櫬而歸耶亦留此而默相我耶弟之生不能捨我死而有知其肯捨我耶歸者自歸留者自留晝雖形不相依夜或夢可相接豫之心不能一日忘弟弟其可捨我耶詰朝惟良丹旐將往嗚呼巳矣雖欲朝夕撫棺而慟不可得矣是用披瀉肺肝灑涕奠饋與弟為萬古之訣焉弟而有知尚或饗之劄歸葬省劄尚書省奉敕勘會胡夢昱昨因臣僚論列謫處遐方今巳身故該遇慶霈須議指揮七月十六日三省同奉聖旨胡夢昱特與放令歸葬紹定四年七月某日劄殿中侍御史王遂奏劄臣讀易至於剝復其傳曰剝爛也復反也又曰物不可以終盡則窮上反下也夫陽消於隂而一陽陽為君子隂為小人剝之時義小人道長而至於極君子道消而僅有存也嘉定而後權姦代出宗主朋邪害虐衆正抱道自守者置不録直言無忌者擯不用仗節秉義者竄迹遐荒剝床及膚亦云甚矣然而置者窮益壯老益堅竄迹遐荒者不容媕阿以茍容豈非所謂碩果之不食者乎鼎餗既覆天啓聖衷回倒持之太阿而獨運之此復而反之候也奈何二十七年之間少者老老者死流離困苦於蠻煙瘴雨者不得以生還幸及新政其與幾何陛下固嘗次第而褒表之起其仆伸其屈而通其滯矣死者不可復生豈非陛下悼痛于聖心者乎臣請擇其尤者為陛下誦之閩人黃幹南康人李燔曩遊朱熹之門迭為領袖凡後進學士相與講説著述世人多誦以為學明東南者熹之功惟幹與燔之力為多權臣嘗用幹試之郡守而尋即廢放燔雖從奔走而隨亦棄遺權臣知敬其書而不行其學知尊其説而不用其人斯道不明由此之故陛下固嘗與幹賜諡而中書以其議邉事不合橫加論駁燔歿雖嘗進職未足示寵臣所謂抱道自守而置不録也蜀人李道傳蒲人陳宓皆名父之子也家庭所傳者義方師友所漸者正學􅊩官臨民所至可紀道傳以丙子被召入對歷陳時弊權姦惡之出知果州中途而殞宓以乙亥應詔上封事丙子輪對非議時政權姦惡之兩把州麾終身不召四明人婁昉奮自諸生蔚有文譽權姦以其意氣磊落言論鯁亮不能附已僅循常調仕止興化軍夫自權姦行乎國政其鄉之儒先幸多尊顯獨昉之賢而慢不之省臣所謂直言無忌而擯不用也乃若乙酉之獄固將一網以盡諸賢也時有若徐瑄為大理少卿奉公持正以聽簡孚之辭權姦諷以連蔓非辜旦暮通顯否則禍且立至瑄不為動胡夢昱為大理評事義不詭隨奮然上疏剖析是非辭直理明夫瑄小降心於誘脅之言則皓皓者易汙夢昱居下位而無言責緘默自全亦其所也一則追官以謫於象一則削籍而放於欽皆含笑謝妻子以保護諸賢以扶持讜議仗節秉義之風豈不足以寒亂臣賊子之膽乎夫是七人者各行其志沒齒無怨言而天不憗遺使置者不及待陛下之簡拔擯者不及待陛下之收召名麗丹書者不及待陛下洗濯而任使之此斯世所以有憾於七人者也且謂陛下宜廣昭天漏泉之澤表七人為天下先還幹易名之典厚燔道傳宓昉飾終之恩復瑄夢昱在身之官而優加褒贈録用其子仍劄下本貫存恤其家庶使後世知疇昔權臣之擅命非出於陛下之本心而天下之公議不掩於陛下之聞見忠臣義士雖死之日猶生之年也大明當空無一物之不昭蘇震雷出地無一蟄之不震起一元之氣自剝而復駸駸進長而內陽外隂天地且為之一泰豈曰小補之哉惟陛下亟圖之伏候敕旨追復省劄六月十日三省同奉聖旨胡夢昱特與追復元資端平元年六月某日押褒贈省劄六月十四日三省同奉聖旨黃幹李燔贈集英殿修撰李道傳陳宓婁昉並贈直龍圖閣仍各與一子升擢差遣胡夢昱贈朝奉郎與一子恩澤端平元年六月某日押象臺首末卷一
