body:
  text: 象臺首末卷五宋胡知柔編諡劄賜諡省劄承議郎幹辦行在諸司胡知柔劄子知柔一介謬庸誤蒙拔擢伏念先父夢昱於寶慶初任大理評事值有詔求直言時真公德秀魏公了翁洪公咨夔相繼明辨濟邸事而先父身為法官親閲案牘遂上疏極論請亟行追贈褒崇且貽書時宰言尤懇切真魏二公讀而嘆曰下僚乃有斯人吾當端拜尋聞忤當國意將置重憲相顧太息曰果爾吾二人當直造榻前爭之得其語以告當國於是真公先黜而後御史李知孝乃劾先父乞竄海外或議起大獄以禍諸賢先父曰吾辦一死不為人纍賴先帝察其非辜迄從寬典羈管象州明年司諌梁成大復奏罰輕於罪乞更施行有旨徙寧越未及行以疾終暴露七年乃沐恩霈歸殯於鄉端平更化收召正人貶黜者以次盡用先帝憫先父忠節贈恤録孤恩綸甚寵至有魂不可招悲悔何及用旌折檻之直且識投杼之過之語知柔偎以無庸獲叨延賞兹拜洪造偹數周行早夜靜思公朝之假借休寵者豈以知柔才足數哉特念先父抵觸禍機視當時諸賢獨慘而不及身被寵光欲使臧孫有後於魯爾竊稽令甲節義彰著不以官品命諡知柔家於江西所知者曽三聘范應鈴以庶官得諡至於先父徒以不肖孤未能發潛闡幽尚爾遺憾不孝之罪將何以歸見丘冢謹依格具録封事行狀及贈恤省劄告詞冒昧百拜控露欲望公朝特賜敷奏褒表易名以昭先帝念忠之本心豈惟先父九地銜恩將俾天下後世忠臣烈士皆知所勸伏候指揮奏訖六月九日奉聖旨特與賜諡右劄本家咸淳三年六月某日押諡議朝奉郎行太常博士王􅐉議曰傳曰國於天地必有與立立者猶人身之有命脈關於興廢存亡不少也我朝以議論立國焯焯在人耳目者濮議也新法也和議也偽學也今觀諸賢之論建始或拂鬱終必消融暫當晦沈久復昭晰間有不幸而蹈窮愁幽憂之境英風誼概之死靡悔千載有景光也是豈偶然之故哉上之所嚮下之所趨也前之所植後之所仰也夫以我朝富強不如秦隋威武不如漢唐而本領清正之氣渾全巍乎與帝王比隆非議論之明效歟若使如公孫𢎞孔光張禹胡廣輩何以導永命而夷厲階也按特贈朝奉郎胡公狀公慷慨有大節試中刑法除大理評事兩遇登對言獲寶璽非福國家之患在山東時逆全未叛也寶慶甲申霅川變起倉卒下于理寺時相因窮治鉤黨轉相誣引少卿徐公瑄實蒞其獄與公意合會詔求直言公遂極言其事乞以周公於管蔡太宗皇帝於秦邸為法以齊威公於子糾唐太宗於建成元吉為戒又移書時相謂公論未有久而不明寃抑未有久而不伸言者李知孝劾公黨逆遂語連洪公咨夔公謫象州徐公亦謫道州已而司諫梁成大亦疏徙徐公象州公欽州皆死囚山矣先是徐公舉公引經決疑近古遺直又言之時相公所草封事出於至誠非沽激求名者比成大所謂瑄極力慫恿合謀共議而為之者也端平甲午上始親政殿中侍御史王公遂奏徐公及公保護諸賢扶植讜議仗節秉義足以寒亂臣賊子之膽詔與褒贈制詞有曰方嘉貫日之忠已墮偃月之計又曰用旌折檻之直且識投杼之過爾雖死可不朽矣公之心迹至是暴白於天下後世嗚呼豈非天哉方寶紹間諱人言事言綱常為尤諱既責真公魏公洪公同時得罪者凡十餘人獨公與徐得禍最烈及議論反正縉紳之彥草茅之士稍復言人倫矣方公大琮擢諫垣首請繼絶謂公一疏貫穿百代之興亡讀之令人流涕先皇初不以為拂也何物蔣峴論方公等四人無將不道賴睿明洞照議遂格夫是是非非交亂於一時未有不遄定於異日今當權銷勢歇之餘而或者猶踵醜正惡直之轍然則公之蒙疑負謗於是非未定之時尚何怪焉惟其彌挫而彌厲愈逺而愈芳國家一線命脈賴以不亡則其有功於世教也其可沒乎公喪四十年上特賜公諡下有司議且兩年􅐉待罪博士反覆遺事蹙然有感於中也故因素為繪推明我朝立國之本末以厲萬世之臣子而誅夫賊滅良心附和時好者按諡法刑政罰姦曰憲剛德決斷曰肅易公名謹議覆諡議朝請郎尚書考功貟外郎兼沂靖惠王府校授楊潮南議曰先皇踐祚之十年改元端平將與天下更始至是始親政六月有旨胡夢昱復元資繼又特贈朝奉郎官與一子訓詞有曰以直言求人以直言罪之豈朕心哉又曰方嘉貫日之忠已墮偃月之計又曰用旌折檻之直且識投杼之過大哉王言兹理考所以為此理之宗主歟用能撫有方夏享國四十一年天命人心凝固而不可解其本在此先是嘉定之季年謝周卿等獄具先皇帝知非濟邸意有旨追贈議者駁之胡公時為廷尉評每閲案牘有感詣卿長徐公瑄欲退具封事久矣駁疏行不勝憤烈會詔求直言既四閲月未有痛哭流涕為上言者公於是以書伏闕下排議者之説且白故王本心乞援秦邸追封賜諡恤孤故事又乞降存亡繼絶之詔同日貽書時宰極言之實寶慶元年八月也甫數日御史李知孝劾公削籍竄象州徐公以上書救公連坐竄舂陵明年六月諌官梁成大謂罪大罰輕又劾公徙欽徐徙象公未去象死焉旋殯凡六年遇慶霈始得歸葬公歿之明年徐公亦歿於象公之將竄象也真公德秀最先逐與公同章被罪洪公咨夔楊公長孺也一時憸人怙威煽熖自謂可以烹制海內然自是言者不絶如魏公了翁諸臣遭黜謫不悔而當受禍之烈莫胡徐二公若也然公之身雖亡而公之言已入於先帝之心故端平之所行動蕩發逹如矢往如川決見於親政之數月一時治象赫然比隆元祐益見前此駁疏之行且必死公於窮荒瘴癘之濵非先帝意也時臺諌如王公遂如方公大琮皆由親擢慨然論及兹事先帝曽不以為忤王公至謂徐胡二公之逐含笑謝妻子以保護諸賢以扶持讜議仗節秉義之風足以寒亂臣賊子之膽方公又謂公一疏貫穿百代之興亡讀之令人流涕此於公何有哉蓋天理人心之至而意嚮由此明倫義由此立氣脈由此續其所繫甚不細也皇上嗣大歷服首詔復故王封爵天下莫不鼓舞於咸淳之政良由上在青宫日深知先帝意形之詔旨藹如也繼又有旨下有司命公諡大明正照幽隱畢伸天地中間莫不順序上此心即先帝之心先帝此心本無所為而為之即天心也嗚呼理考可謂處天下之至難公可謂言人之所難亦惟心與天一則難者直不啻折枝之易爾伊川謂如今人道尚不廢者只是有那些秉彛卒殄滅不得以是知三綱五常之定理繫於人而命於天天一日不壞則此理一日不易寶紹諸人遂欲盡力斬伐之以𡨕行於一時可乎不可也故王之心賴胡公而白胡公之心賴先帝而白胡公得白於先帝之心暴之千萬而無怍斯固伏於秉彛之性抑亦祖宗仁孝之傳乾淳諸老流風之近固應有此嗚呼公所言十行六七矣天誘聖衷將盡行其言無難也庶乎人紀盡而覆載之內無一不滿之處嗚呼真無愧於人臣之分矣公廬陵人其行與事具見家集謹案所上封事徐公所上時宰書質之告詞劄命臺疏互考顛末而識其大節如此奉常議易名憲肅而公之父諱憲於名稱未安按諡法內外賔服曰正剛德克就曰肅請改諡曰正肅謹覆諡都省集議吏部申胡夢昱覆諡事稽之典故賜諡者太常禮院議定博士撰議考功審覆都省集議省官有異議者聽具議以聞竊惟名者實之賔易名之典必托其行事之實寶慶間詔求直言時大理評事胡夢昱上書極諌力詆時政嘉其貫日之忠旌其折檻之直有詔復官繼贈朝奉郎官其一子訓詞有曰以直言求人以直言罪之豈朕心哉御史稱夢昱保護諸賢扶持讜議仗節秉義足以寒亂臣賊子之膽此夢昱之大節表表在人耳目而公朝賜諡之本意也諡法曰強毅果敢曰剛正直無邪曰簡若夢昱者可謂剛而塞簡而廉者矣有強毅正直之實宜得強毅正直之名庶幾天下後世聞其諡而知其事稱其名而想其人得之無愧而名之非溢美也奉常初議諡以憲肅考功以夢昱之父諱憲於名稱未安乞行改諡但正肅二字恐於夢昱平生大節尚體狀未真合行詳審欲批送禮部下奉常參考審諡申審諡奉議郎太常博士夏錫人道以綱常為大扶植綱常以強毅正直為大蓋強毅則其志伸乎萬物之上正直則其氣塞乎天地之間此胡公夢昱身可死而節不可奪時愈久而名愈不可磨也準批下公有強毅正直之實冝得強毅正直之名事情允愜審諡法合諡剛簡申省部偹申朝廷取自指揮施行覆審諡承議郎守宗正丞兼權考功郎官兼沂靖惠王府教授梅應發議曰咸淳三年夏有旨賜故大理評事胡夢昱諡奉常諡議曰憲肅前考功以其父名憲請改正肅上之省矣省官議送奉常審定曰剛簡仍下考功審覆切惟本朝以議論立國所以扶植天理民彛於不壞不滅之地者惟士大夫一點忠義之氣不以死生禍福易其介爾孟軻氏有言其為氣也至大至剛以直飬而無害則塞乎天地之間坤以簡能故坤之六二臣道也必曰直方大蓋氣無是餒則為剛動直以方則為簡士大夫以此為氣節則上不負天子下不負所學矣寶慶初先皇帝命追贈濟邸棠棣孔懷之情惻如也何物姦邪肆為疏駁詔求直言時政將以來讜議既四閲月蔑有推廣先帝之本心者評事以棘寺小吏獨當雷霆懇懇欵欵惟以倫紀之天為急先帝亦既采納之言路憸壬附和時宰極力抵排一疏貶之象再疏徙之欽而評事竟殞炎荒矣羣隂睍消端平親政追念遺直既㑭歸葬且復其官録其子訓詞有曰以直言求人以直言罪之豈朕心哉又曰方嘉貫日之忠已墮偃月之計又曰用旌折檻之直且識投杼之過至是先帝友愛之心益張而評事死且不朽矣按諡法強毅果敢曰剛正直無邪曰簡若評事之不怵於勢不靡於邪仗節死義主爾忘身諡曰剛簡疇不謂宜昔參政魯公宗道太常初擬以剛簡易其名議者不知為美諡竟改曰肅簡歐陽公每以為惜今魯公所不得者評事得之抑亦可以無憾矣冝如太常議謹覆諡九月二十九日奉聖旨依吏部審覆至事理胡夢昱特賜諡剛簡像贊雍虞集山深茅屋風波濶孤舟小去處本無心於焉發長嘯白雲莘野耕清風渭川釣悠悠千載下斯人可同調錢習禮藴純正之學負方剛之氣侃侃立朝屢陳讜議其欲厚者昆弟之大倫其所切者邦國之重計竟致忤於權姦甘逺被於播棄正類抑於當時公論伸於後世如公者信所謂世之偉人國之令器也周述抗疏以援懿親冀欲回乎天意忠言至於激切甘逺死乎荒裔譴莫甚於寶慶之斥恩莫隆於端平之諡身雖詘於一時名乃昭於萬世我見公像而再拜凛乎其有生氣仰輝光於廬陵其視忠簡為無愧也熊概氷肌玉骨鐵石心腸清秩躋庸於棘寺危言激切於廟堂仗義秉節宜乎為姦諛之是妬推忠布赤凛然與日月而爭光一斥不復竟殞遐荒蹈寶慶之咎不測受端平之命惟良公之事業載諸青史固不在畫像之有無公之後人歲時景仰庶幾展孝思而感秋霜余生也晚慕藺尤長幸忝公之鄉里愧材識之薄涼視公死生髙明正大誠足以厲風化而植綱常豈但視淡菴而無愧上當與忠節千古而同芳李禎惟剛簡公當宋季世直慕汲黯言如陸贄上書穆陵懇切諄至權姦嫉之卒蹈顛躓忠義炳然星輝日熾上配淡菴亦以簡諡嗚呼廬陵盛哉胡氏陳文鐡石真心圭璋美質問學則底於純明爵秩則躋於華密其讜議也實天理民彛之所關其貶斥也乃姦諛權幸之所嫉身雖殞於炎荒名乃垂於史筆宜諡號之寵加昭忠義之罕匹皎若秋霜凛踰烈日噫顧豫忝鄉郡而為之後進慕公勤山斗而莫之紹述也象臺首末卷五
