body:
  text: 象臺首末卷二宋胡知柔編告詞焚黃祀文附中書舍人洪咨夔朕訪落伊始首下詔求讜直蓋與諫鼓謗木同意以直言求人而以直言罪之豈朕心哉爾風裁峭潔志槩激壯由廷尉評上書公車言人之所難言方嘉貫日之忠已墮偃月之計問塗胥口訪事瀧頭曽無幾微見於顔面何氣節之烈也仁祖能全介於逺謫之餘孝祖能拔銓於投荒之後撫今懷往魂不可招潦霧墮鳶悲悔何及陟階員外仍官厥子用旌折檻之直且識投杼之過爾雖死可不朽矣可特贈朝奉郎吉水縣刋告詞跋皇上踐祚之十年改元更始躬親萬幾天地清明如初開闢殿中侍御史王公遂首言故廷評胡夢昱仗節秉義足以寒亂臣賊子之膽宜褒表以示天下上為惻然命贈公員外郎而録其孤於是聖天子優容直言之本心與廷評公死且不朽之令名若揭日月而行天元普試令吉文始至拜學顧瞻兩廡凡是邦忠節文行可以勵俗者皆有祠而公獨立敢言風節翹然視忠簡胡公等耳乃未有位於鄉社之列大懼無以揚忠烈表士則也乃求公像而祠之且摹所贈公官告刻之學元普竊惟崇護善類扶植正論此我朝立國命脈所繫也故修潔鯁亮之士偶見抑者終必伸激切忠憤之言暫未省者久必録激揚觀感之餘爭以犯顔敢諫為忠而底寮下士皆能明目張膽言天下事社稷長逺實嘉賴之今公贈告之詞有曰用旌折檻之直且識投抒之過大哉王言有以見聖心無我湛如太空不容浮雲㸃翳之留而忠臣義士固天道所祐誠可安之無懼則是告也詎止假寵於胡氏哉端平三年二月既望朝奉郎知吉州吉水縣主管勸農營田公事陳元普謹題之下方焚黃祀文嗚呼古今之立言者多矣而關繫綱常者如晦冥之日星蓋自周轍不東三綱淪而九法斁麟經不續於後世而人極幾不立矣然天每於劇弊大壞之時必豫出一人焉以擬之父子之綱絶於戾園得田千秋之一訟而後明君臣之綱絶於昌邑得嚴延年之一劾而後正兄弟之綱絶於淮南袁盎一語迷途一呼夫婦之綱絶於王后長孫一疏夜行一燭故雖無復西伯之父子而未盡至於無親雖無復夷齊之君臣而未盡至於無敬雖無復太伯之兄弟而未盡至於無遜雖無復溈汭之夫婦而未盡至於無恩宇宙之不為積塊聖教之不為異端生人之不為鬼魅其於斯人蓋有賴焉我宋立國之大綱盡正而維持扶植亦斯人是賴曩時周人處君臣之難割兄弟之愛其後必封蔡祀必續固不待知者而後知也苐當羣疑滿腹衆難拂胸之時不有一人推闡此理上以導主上之聰下以斷天下之惑則粟布之謡誤歸於上矣惟公忿在負芒思不恤緯公車騰剴切之疏政府移誚責之書上於兄弟豈無情哉而偃月之人遽從而嗾之朝窺虎豹之關夕和雪雲之句棄官如屣更覺身輕然舍人不斃於曉鍾而太史竟疲於霜夜幅巾涼館者一載藁葬城西者八年山鬼有靈多謝呵護猶全面目歸訣家人蓋棺事寧而小人之運亦且去矣今天子聖明一朝赫然洗舊百為而與之新興在原之悲復撫封之渥而一言悟主者亦得以霑餘膏而薰賸馥綸命賁加恩言甚寵且有識過投杼之語自非主上真有因心之愛責躬引咎之意豈復以加於窮愁死徙之臣哉誠使主上充此善機矢去川決遂回友愛之天而濟邸之祀不至終絶則公於綱常豈無少補於萬一歟卜日得剛揭䖍奔告公雖不作亦不怍矣敢告行述公姓胡諱夢昱字季昭號竹林愚隱吉之吉水中鵠鄉新嘉里功德源人也生於淳熙乙已三月庚辰曽祖厚禮祖伯達不仕父憲周師靜春劉先生子澄以文行著兩舉進士不第公生兩嵗而孤家無卓錐其母羅氏忍飢寒以事教育長慕汲長孺之為人嘗名黯字季汲平居未嘗失色失口於人人有一善如自已出即有秋毫㸃汚絶不與校嘉定丁丑登進士第授南安軍南安縣主簿丁母憂服闋授南康軍都昌縣主簿中大法科授峽州司法除大理評事凡兩輪對皆隨事獻言不毛舉細故以塞責時寶璽來歸大布恩澤公曰是非國家之福豈臣稱功德冀官爵之時獨不受轉官賞而援江寧獲寶河湟歸土等事極言今日政是嚴恭敬畏愛惜日力之時當以事機易失為深慮以事力未奮為深恥以事勢叵測為深憂言極剴切時逆全歸附朝廷恩之過厚漸至驕盈公以為國家之患不在心腹在山東乃獻言欲先時而為之隄防隨時而為之操縱所謂先時而為之隄防者以為淮甸所籍以禦者民兵之力居多合汰在籍老弱之官兵而優附籍勇敢之民兵使有犬牙相制之形則彼必有所顧忌所謂隨時而為之操縱者以為此曹志在攻取朝廷每遇其生事而禁約之今官兵民兵合養威持重而此曹之剛心勇氣不若使得發泄於此時寧宗皇帝側身修行敬天恤民而灾害怪異亦往往有之有星隕於東北其光如電其聲如雷公以為主上誠心實德對越在天不宜有此然仰窺天意俯察人事必有端倪乃極言今日禍機伏於隱微之中者五事乞舉行范純仁申敕中外條陳本職之說時有以郡縣差役不均賦額虧陷請行經界者公曰苟非其人法不虛行弊未可革而害先及矣詭名之隱寄者可許而歸并而不可責以纍年之賦其昔磽埆而今肥饒者可許其因仍而不可增以數倍之賦遂極言之山陽虛閫廟議將遣許國公聞之嘆曰山東之禍止此矣此曹平時頗以戰功自負且以忠赤自詭而德望不足以鎮之能無忿乎遂援戴淵殷浩等事草奏欲因輪對及之未及對而許行公扼腕久之後果敗人咸服其精識寶慶天子之即位是當嘉定之甲申封皇兄于濟賜第霅川妖民妄圖王坐此死執政因窮治其事轉相誣引多所連逮少卿徐公瑄實涖其獄公謂徐曰為逆人而伸理豈得已哉乖陛下之至仁是吾憂也徐即舉公充所知有勤拳憂國慷慨敢言引經决疑近古遺直等語未幾議奪王爵而廢其祀事且下廷尉約法公詣徐請曰身為法官何忍坐視人侮法於帝兄而不救時方下詔求直言公遂應詔上書大略以為太祖皇帝艱難肇造以有天下顧命之日不𫝊之子而𫝊之弟立國根本蓋與周人異世同符周人不幸而有管蔡之變我宋不幸而有秦邸之變又不幸有近日濟邸之變其事不同所以處兄弟之難者則同然周公待管蔡終歸於厚太宗皇帝待秦邸者終歸於厚故皆能有道之長齊威之待子糾者終歸於薄唐太宗之待建成元吉者終歸於薄故皆有身後之禍恭世子本無置毒之事驪姬則以置毒誣之晉獻公無以散其寃抑之氣故有請帝託秦之怪戾太子本無巫蠱之事武帝有以散其寃抑之氣故有晉人之事釁而無晉人之妖孽又引鄭伯克段周公改過事反覆極論且辨濟王之不幸其事與管蔡秦邸不同乞隆追贈褒崇之典降存亡繼絶之詔嵗時遣使致其祭祀撫其家屬厚其賚豫又貽書丞相史彌逺以為公論在天下未有久而不明寃抑在天下未有久而不伸此論不早明他日必有反覆此抑不早伸他日必有厲階丞相得書大怒於是御史李知孝承風㫖劾公黨附叛逆與洪公咨夔並逐而公則有削籍羈管象郡之命蓋寶慶乙酉九月已未也廣西帥臣錢宏祖欲殺之賴運判陳公汶左右得免在象扁所寓室曰涼館讀書其中嘗因拾皂角有詞云颯颯秋風飛起瘴嶺黃塵撲地鐵漢儘禁當不比氷肌細膩縱來擦洗也只是本來膚體羊角因風晚樹自是秋來氣數入藥不和同瞑眩得人嫌惡只宜將去淨洗人間垢汚其寓意堅確如此未幾又為御史梁成大所劾再徙寧越未及行以痢疾卒蓋寶慶丙戌九月丙申也又七年遭遇慶霈始得歸骨端平更化收召正人而物故以衆上甚憐之侍御史王公遂因奏乞還黃幹易名之典厚李燔婁昉李道𫝊陳宓飾終之恩復徐瑄與公在身之官優加褒贈録用其子仍劄本貫存恤其家丞相鄭公清之乃奏贈公員外郎與一子恩訓詞云朕訪落伊始首下詔求讜直蓋與諌鼓謗木同意以直言求人以直言罪之豈朕心哉爾風裁峭潔志槩激壯由廷尉評上書公車言人之所難言方嘉貫日之忠已墮偃月之計問塗胥口訪事瀧頭曽無幾微見於顔面何氣節之烈也仁宗能全介於逺謫之餘孝宗能拔銓於投荒之後撫今懷往魂不可招潦霧墮鳶悲悔何及陟階員外仍官厥子用旌折檻之直且識投杼之過爾雖死可不朽矣當筆者中書舍人洪咨夔也公一門孝友閫內無間言囊無私蓄其去國也弟利用相從於象死其歸骨也兄夢白至自象以瘴毒疽發於背死方公太琮在言路日當復極論濟邸繼絶事謂公死南弟兄暴骨雖官一子未足償一門之痛方旋去事未及行復平章事喬公行簡監修寧宗皇帝實録行下本貫取索奏議行實修纂立傳其從祀縣學宫則邑令陳君元晉其從祀郡學宫則太守從林李公義山其從事象學宫則廣漕比林羅公愚也輪對劄嘉定壬午六月五日輪對第一劄臣一介謬庸備數理寺循次陛對自幸遭逢越職獻言輒忘狂僣幸陛下容納焉臣仰惟陛下以純誠事天嚴恭寅畏是也以實德格天寬仁勤儉是也以陛下之操守踐履無一毫人僞介乎其間明白洞逹真可對越在天故臨御以來變故之更歷者不知其幾而借助於天以消弭之者亦不知其幾試以大者言之外而强藩跋扈人皆曰此唐之淮蔡也雷厲風飛不旋踵而誅之內而權臣根據皆曰此漢之梁氏也天開日明一反掌而去之斯二者非人力所能與也天也昔之轉禍為福轉危為安者無一非天邇者鎮寶之彰彰來歸輿地之寖寖自復者又何往而非天抑臣聞之承天眷之已至者易迓天眷於方來者難鎮寶之歸天也然講東都之㑹而使夷夏之玉帛交歸者此其兆也輿地之復天也然雪南渡之恥而使祖宗之境土盡復者此其占也興復之祥天方界之興復之運天方啓之臣願陛下愛惜日力而以慊然不自足之心應之上下戒於驕盈內外懲於玩愒以事機易失為深慮以事力未奮為深恥以事變叵測為深憂滌蕩振刷之意日新於一日經營圖治之功日加於一日則天之啓迪陛下者豈特如今日可觀而巳江寧獲寶晉惟哆然自足也卒無以大規恢之業河湟歸土唐惟哆然自足也卒無以收振起之功往事亦可鑒也書曰惟王受命無疆惟休亦無疆惟恤惟陛下兢兢而亟圖之𫝊曰責難於君謂之恭臣不勝惓惓第二劄臣聞謀國者不可有所玩天下之患常伏於所玩秦以慕容埀為不足忌而玩之秦之患卒生於埀梁以侯景為不足疑而玩之梁之患卒生於景方今天下所通患者埀亡之勢也此患之顯於有形者也臣竊以大勢而逆料之其亡之遲速未可知而終於必亡為可知蓋其兵力銷於戰場民力疲於轉餉財力匱於應辦外示强大之形內戚危亡之證釡魚幕燕視䕃幾何國家之患終不在心腹臣之所患者則山東歸附之衆是也此則患之隱於無形是也當其歸附之初國論譁然或有養鷹揚去之疑或有養虎遺患之懼陛下斷斷然推赤心以待之果能竭智勇以報我傾忠誠以附我緩急惟命令是聽平居惟紀律是安昔焉以為可疑者今固不足疑矣然玩之而不復為之防可乎昔焉以為可懼者今固不足懼矣然玩之而不復為之慮可乎陛下廟謨明照固足以消其姦宄之謀大臣邊籌深密必有以杜其姦宄之謀秦梁之變萬萬無之抑臣之私憂過計則深以為不可玩焉蓋我之阻隘彼盡知之我之虛實彼盡熟之生聚日繁溫飽難適希覬日重怨怒易生首領縱無他志偏裨寧肯協心茍不先時而為之隄防隨時而為之操縱卒然有變何以制之夫此輩平昔之所自負者特以其勇於戰鬭而王師莫能及之臣竊聞淮甸之所藉以禦者民兵之力居多而官兵之怯特甚今莫若汰官兵之老弱核官兵之虛籍就移其廩給以資民兵焉合其强壯者而教閲之擇其英傑者而統率之略復其租賦常寬其徭役以優假之將見官兵之在籍者日精民兵之附籍者日衆有犬牙相制之形無尾大不掉之患彼自有所顧忌而不敢妄生邪念矣臣所謂先時而為之隄防者此也夫此輩平昔之所不滿者其志每在於攻取朝廷則不欲其生事而禁約之臣竊謂讎敵未有滅亡之日邊戍未有撤還之期以守為守不若以戰為守官兵民兵養威持重以待而時遣歸附之兵乘間以抵其隙聚則散散復聚或持其急或搗其虛知罃所以困楚王朴所以取淮其策蓋出於此滅則有分地可以處之未滅則此輩之狠心勇氣有所發泄終不至於蓄而生變焉臣所謂隨時而為之操縱者此也隄防操縱而盡其道非特可以銷患於未形而患之顯於有形者亦不足慮矣臣之愚慮近乎迂臣之過計近乎拙惟陛下採曲突徙薪之說持履霜堅氷之戒與大臣兢兢亟圖之宗社幸甚嘉定甲申正月二十二日輪對第一劄臣理寺之賤有司也惟刑讞是評其於當時之大務詎敢出位而妄言然忠誠所激有勃勃而不容遏者輒昧死為陛下陳之臣聞漢臣董仲舒之策曰國家將有失道之敗天乃先出灾害以譴告之不知有省又出怪異以警懼之尚不知變而傷敗乃至以此見天心仁愛人君而欲止其亂也陛下之嚴恭寅畏天實鑒之陛下之寬仁勤儉天實知之矧簡畀之方隆宜休祥之洽至然災異之來未有如故嵗之數者逺郡之旱近郡之水京畿之火譴告亦既諄諄矣繼以日蝕之變又繼以冬雷之變乃若星隕於西北有光如電有聲如雷則尤異之大者仰窺天意俯察人事譴告未已而警懼繼之者其故果安在也臣竊思之殘賊未殄報復必深禍所伏也新令方張窺覦難免禍所伏也歸附之衆情態叵測禍所伏也驕蹇之卒輒肆扇搖阻饑之民間行剽掠禍所伏也禍機伏於隱微之中而未發焉蓋賈誼所謂痛哭流涕者也奈何習俗惟玩愒是耽人情惟茍且是溺久安長治之策尚闕於建明防微杜漸之計或疏於植立竊意天心仁愛陛下之深惟恐禍機之發而傷敗至焉此譴告警懼所以不厭其數也以故嵗天災流行若此繼自今以往陛下無徒區區為荒政之講火禁之修而已盍亦逆計事變而思膏澤有當霈者歟橫流有當遏者歟曲突徙薪之謀有當謹者歟以故嵗之變屢形若此繼自今以往陛下無徒屑屑然齊心膳素露立默禱而巳盍亦推測端倪而思離明之或蔽歟渙號之或愆歟星拱之邦或有隂懷不靖者歟書曰王省惟嵗陛下臨御之嵗今又新矣政當以故嵗之災異而深省之易曰履霜堅氷至言慮患貴乎早也詩曰逮天之未隂雨徹彼桑土綢繆牖户言防患貴乎預也今日轉禍為福轉危為安于以消弭災異于以迎迓休祥顧陛下之施行如何耳昔范純仁進言於神宗皇帝朝以為郡邑之弊守令知之一路之弊職司知之茶鹽利病民兵刑法差役之弊提其局及受其害者知之軍政之弊主帥與將領知之邊之弊守邊知之伏望特下明詔申敕中外各使條陳本職限一月聞奏然後審擇而行之此蓋救時之切論也臣敢托之以為陛下獻願陛下謹天之戒畏天之威鑒已往毖方來與二三大臣兢兢亟圖之若夫三白已見一稔可期固自可以占陛下獻嵗之祥臣猶嘵嘵然以故嵗之災異言之可為不識忌諱之甚者惟陛下矜其嫠不恤緯之憂而赦之貼黃臣生長莊農竊知所在賦額虧陷而作邑者有湯火煎熬之嘆役訴紛紜而充役者有破産代輸之苦其蠧弊之源蓋有在焉諸縣之書手是也臣耳目所接如江東西諸縣所謂書手者官無一錢一粟請給及之然聖節敷買之糜費取辦焉監司過往之供應取辦焉佐官白直之傭顧取辦焉甚至縣官宴集之需送迎之具亦取辦焉其他百色誅求猶有不容縷數者夫既空役其身以服勞於官而又虛取白撰以應辦於官所以自饜其溪壑之欲者不與焉茍非肆欺籍帳隱漏稅苗詭甲名為乙户指土著為逃移籍有産之家以為囊槖焉其費從何而出其間縣計從容去處能免此弊者無幾以江東西諸縣推之他處未必皆然今日之經界藉使無弊而書手之害未去焉不數年間其弊又將如故矣臣竊以為諸縣書手人雖甚微而蠧弊之關繫則甚大繼自今當給以重祿縣計之窘促者計之申明於州州申明於上司略豁其經賦以佐其經費之不及若是而猶敢取辦於書手則以枉法贓坐之庶乎書手免重費之纍畏重祿之法而有所顧藉矣不特經界之已行者不至於弊經界之未行者亦可許之首正而革其弊矣如臣言可採望陛下并付有司訂議修立成法而頒行之天下幸甚甲申擬對第二劄臣竊惟邊戌未撤帥閫之關繫甚重以今日三邊計之山陽之帥閫關繫尤重蓋歸附之衆實萃於山陽任總戎之責者茍無以鎮服之則彼將有所玩而生變無以駕馭之則彼將有所激而生變授鉞之或當或否國之安危判焉臣謂為山陽之帥閫關繫尤重者此也臣請以古事證之河南新附在祖逖固能以恩結之抑亦平昔之雅望素孚焉一旦統之以戴淵則烏塢相繼叛去矣此無他無以鎮服其心故也姚襄單騎來歸才見謝尚面歡若平生一旦制之以殷浩則反噬之禍不旋踵此無他駕馭之失其道故也山陽帥閫之虛久矣廟謨宏深本難窺測外議揣度未免紛紜咸謂向來之策勳邊頭者陛下實注意焉臣竊以為歸附之首領平時頗以戰功自負且以忠赤自許萬一陛下之謀帥果如外間揣度之論彼將曰子功出吾下而位居吾上何也竊恐不能無忿心又將曰豈無他人而使是子臨我是防我也竊恐不能無疑心疑忿既生釁隙易起蕭牆之變將必隨之今日文武之士布滿中外宸衷所契翹館所儲與夫公論所推人望所屬豈無鴻儒碩德胸中自有兵甲可以授鉞而分閫者願陛下與二三大臣早為之所選擇而遣之使如李光弼之始至而壁壘旌旗精彩皆變可也又使如韓琦范仲淹之經略西夏而邊上有一韓一范之謡可也庶乎羣疑亡而衆論塞矣歸附之情不特帖然相安抑亦可以得其死力而終為吾用矣春秋時師慧之過朝也曰必無人焉則輕之繞朝之贈策也曰子無謂秦無人則晉懼焉以山陽帥閫之久虛而陛下弄印遲疑幾半載而未有所屬焉覘國者其謂之何此臣所以日夜痛心疾首而不能已於言也惟陛下與二三大臣亟圖之水石圖讃趙文故園松菊歸步月明蕭然獨往百世之英曽先之新松日長水月亡恙乃如之人霄漢之上松竹猶存水石如故人月爭光千古萬古李元正月到天心水不湍中流但見石㠝岏是間有恨君知否莫作當年八陳看楊如圭石或泐水或竭松竹或折月或缺亘萬古者獨立之節康民獻百世之英萬夫之雄其撓而不濁若山下之水其翳而不昏若空中之月而其涅而不緇又何愧大夫之松象臺首末卷二
