  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0011_WYG_003-1a, image: WYG0447/WYG0447-0027a.png}
body:
  text: 象臺首末卷三宋胡知柔編詩泉南翁定應詔書聞便逺行廬陵不獨詫邦衡寸心祗恐孤天地百口何期纍弟兄世態浮雲多變換公朝初日盍清明危言在國為元氣君子從來豈碩名同邑胡炎囊封朝奏大明宮噓起廬陵古直風言路從來天樣濶蠻荒誰使徑旁通朝中競送長沙傅嶺表爭迎小淡翁自愧聖賢無補報臨分憂國意何窮東山楊長孺新來消息使人疑一網如何盡去之元祐祗今為紹聖姫周嫠婦謾深悲世事昏昏酒正酣苦言難藥盜言甘李庭男子真竒絶便是吾鄉小淡庵小山杜耒廬陵一小郡百嵗兩胡公論事若少異處心應略同有書莫焚藁無恨豈傷弓病愧不逺送寫詩霜月中天台謝鄆燕雀羣飛敞漢宮驚聞伏馬忽嘶風洪恩大度祈三宥烏府何顔奏一通徑節敢攀丹陛檻忠言應夢白頭翁象臺一貶端然直所幸身窮道不窮永嘉戴栩古郡荒涼象迹新君行况是去裝貧此愁欲别柳邉雨明日初程桂外人從古不多如意事加餐宜惜未歸身春風未必天涯盡木斛花開瘴水深皆山李元實次王盧溪送淡菴貶新州韻以送之知公不怕鬼門關直氣橫干清禁間雕觜明知林甫毒鯁言要與淡菴班一身渠任黃茅裏千古名標青史間非晚清朝邪正辨紫薇紅藥待君還清名傳播到黃支直節寧憂趙氏危虎尾蹈時都不畏象臺到日大為竒是行廊廟人皆怍所過山川鬼亦知官職本為餳音尋底鴆音鄭傷今正論有誰持再作十絶寄胡伯貟兵侍仲方尚書文昌武庫九霄中翁是新州老淡翁應念象臺今日客清風端與我翁同公家富貴足掀天都出新州十九年若念象臺今日客方知淡老子孫賢官職廬陵不是無文章更亦擬歐蘇若言直氣橫牛斗但見人間説姓胡赤手批鱗事最難况渠班底一微官淡翁去後能如此當作三生石上看淡翁直氣貫三才八座雲仍漸上台料想而今聞底事中心應亦念渠回朝行多少氣英英不怕霜朝曲觜鷹一網而今都打盡廬陵人且説廬陵紹興秦檜秉洪鈞淡老昌言斬檜秦猶恨日來三四子抗章不説斬姦臣一從藝祖握乾符元氣都憑直氣扶若欲皇家宗社永胡家直氣豈容無東西兩浙及閩川皆見鴛行有直言若我江西獨鉗口淡翁九地也埋寃寄語朝家廊廟人新州竒事又重新肯甘富貴忘他底應為斯人作好春自詠步王盧溪韻新來時事不相關嬴得蠻荒日月間存取丹心照碧漢任他黃口閙清班非求美譽傳千古不欲浮生愧兩間天亦而今無奈説秀才且荷肯相還瘴地人憂我莫支人雖危我我何危元來憂國不怕死非為捐身要出竒肯怨江山千里逺幸逢天地一時知孔光張禹人無笑祿位輸他善保持再寄沉沉漢殿曉煙迷燕雀輸他取次飛爰把丹衷吐骨鯁且甘白飯與魚肥意循天理可無忤豈料人心各有機日薄西山豫未死當留此語待公歸同邑李伯圭伏馬總為芻豆謀孤忠嫠緯不勝憂事當言路官無小理未安時心肯休千古綱常增砥柱一身去就等虛舟惡鴟儘任陵鸞鳯嬴得清名雪外州豫章宋自適凛凛廬陵一淡翁飛揚復起振髙風周無二叔聖何别商有三仁道則同孤迹本如雲出岫清名應比日行空翩翩鴈影梅花外雪片飛來酒對中同邑曽夢選象州銷黯又欽州道路何辭作逺逰投北誰憐新逐客落南不減舊編修江山在處猶加護廊廟諸公底著羞天定從來人可勝著書消日海西頭印山羅存甫赤心端欲贊皇圖鼓瑟那知却好竽崇論已聞驚仗馬攄忠寧復忌城狐當為天下竒男子肯學人間小丈夫更問淡菴老居士儋州還似象州無安城劉夢才紹興寶慶百年餘古往今來説二胡論事直須殫懇切立朝端不忍阿諛兩賢幸屬吾州有萬事何曽公議無象郡新寧不同詔九重天子正儀圖竹谷羅茂良好讀床頭易一編盈虛消長總天然崢嶸齒頰皆氷雪肯怕炎方有瘴煙頻寄書來洗我愁莫言無鴈到南州長相思外加餐飯記取承君舊話頭池陽丁黼一封書奏觸天威萬里徒行出帝畿始得明時來讜論豈知薄命墮危機身同季弟辭兄去女抱嬰兒伴母歸風雨瀟瀟秋又老鴈應不到嶺南飛剛簡公留象自咏榕隂圖古人遺直今人是肯效鄉原事踽涼不把危言陳北闕因何著腳到南荒排姦斥佞風霜手耐冷禁寒鐵石腸贏得榕隂濃密處忘言默坐對爐香姪大用伯父竹林先生因濟邸獄謫象郡其在貶所常坐榕隂對爐薰賦詠自適大端弟筆以成圖久矣今上嘉其忠烈賜諡剛簡豈勝存沒之光亟欲鑱此圖以貽無窮顧力有所未逮且依先生自述韻拜賡一律以俟云姪大用頓首權臣擅命久心傷賊主之兄意未涼今日封章期救死明朝削籍自投荒九重偶眩誣賢舌四海皆知疾惡腸事久劃逢天一笑錫知剛簡易名香姪孫震雷伯祖剛簡公榕隂圖先君肯堂翁常欲鑱石因循至今一日震雷從家弟震載觀則名公巨筆聮編盈軸益知我公大節起敬慕于易世之未歇者如此雖名光史册而圖不多見不得無餘恨乃追和自述并名筆勒之石姪孫震雷頓首霅川疑獄獨承當敬逺炎炎即館涼帝子幾曽謀不道相臣自弗肯包荒李貓初劾猶全命梁犬重評竟斷腸甘死如飴行素志豈知流入殺青香艮巖羅䦔用王盧溪韻虎豹摩牙闖九關人心節義不踰間監門鄭俠能無懼折檻朱雲若是班賴有名留千古重不容身在衆邪間忠臣義士骨不朽白日青天敕許還百世期令固本支一身寧復許安危前瞻象郡賢方去後有鶴山人效竒地接宜陽山谷笑舟回湘水屈原知櫝中龜玉而輕毁祿位何妨善保持鳳山曽宏甫湘山冷熖氷四海寒蔽天晴日晝隂朝路偷生盡緘口瘴鄉投死猶甘心里閭節義紹襄簡史册姓名光古今天定勝人公議在褒忠録後上恩深皆山李庭芝緑鬢兩科好丹心一片忠言言關國體蹇蹇匪渠躬誰謂鴛行底能持鯁論公象臺死得所萬古憶清風玉季當春孟公書以訃聞但期同氣骨不作異鄉墳豈料鱗音後俄傳蝶夢云想教寧越水恨不識朱雲同邑李伯圭危言不畏觸干戈瘴雨蠻煙換玉珂今古廬陵兩胡老是非儋耳一東坡拳拳抗志甘三已惻惻招魂聽九歌信得平生稽古力初心不為履朝鞾即靴聖朝寬詔下龍墀盡放纍臣脫串羈痛失長沙賈誼舍空存潮海退之祠孤忠元自輕生死白骨寧知問去歸萬里江山丹旐返悲風一掬淚沾衣南溪楊賔言湛湛長江月髙標太華清孤忠千古重去國一身輕箇事從來有近時多怕行凛然公屹立一死足平生貴溪葉夢得淡菴久死瘴江濵依舊歸來侍禁宸浩歎宗孫長去國從知志士不謀身皇天若假令多算聖代終無棄闕我時閲報痛生哀灑淚南詹吊象臺今日方知公有子皇天祐善世生才後坡林經德扶植綱常抗直聲白頭不憚嶺南行書云惟孝友兄弟臣罪當誅王聖明削籍投荒從寶慶陟階録後賴端平朝家賜諡今方舉凛凛孤忠死亦生永嘉林起鼇直節槃槃古樹平綱常山重一身輕歷陳髙廟神靈語願法周公日月更飛霧墮鳶遷客憾漏泉踈爵大君明百年富貴端能幾天壤無窮獨令名子誠李處敬至元壬午省委至吉山村出示剛簡公象臺首末讀之凛然為君細讀象臺詞前代悠悠事可知逐客逺投魑魅窟姦臣髙照鳳凰池腹誹論起秦刑酷斗粟謡興漢道虧幸有褒封丹詔在忠臣才免似湘纍濟邸獄成寃莫雪朝臣仗馬氣先降自知白日孤忠貫獨擬洪鍾寸筳撞坡老肯留儋耳郡退之還問樂昌瀧二公以後評人物未信欽州是陋邦巍天壯志切雲冠懇懇封章洞肺肝痛恨帝閽排虎豹終教象郡鎩音晒鵷鸞一棺英骨重泉夜兩字清名六月寒讀盡餘編三嘆息忠臣心事古今難方崖蕭太登大德辛丑秋分司象州重新剛簡祠宇越明年壬寅春孟詩以識之吊古來磨前日恨入南又記去年時老榕偃蹇渾無恙誰與重新剛簡祠傷心往事可重論獨坐掀髯水竹村千古廬陵髙絶處先生又是淡菴孫象臺首末卷三
